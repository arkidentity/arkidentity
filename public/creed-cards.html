    // ============================================
    // UTILITY FUNCTIONS
    // ============================================
    
    // Get card of the day (deterministic based on date)
    const getCardOfTheDay = () => {
      const today = new Date();
      const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
      const cardIndex = dayOfYear % CARD_DATA.length;
      return CARD_DATA[cardIndex];
    };

    // LocalStorage helpers
    const STORAGE_KEYS = {
      LEARNED: 'creedcards_learned',
      LAST_STUDIED: 'creedcards_last_studied',
      STUDY_MODE: 'creedcards_study_mode',
      WELCOME_SEEN: 'creedcards_welcome_seen',
      CURRENT_INDEX: 'creedcards_current_index',
      TAP_HINT_COUNT: 'creedcards_tap_hint_count',
      SESSION_DATE: 'creedcards_session_date',
      SESSION_COUNT: 'creedcards_session_count',
      SOUND_ENABLED: 'creedcards_sound_enabled',
      LAST_UNDO: 'creedcards_last_undo'
    };

    const getLearnedCards = () => {
      const learned = localStorage.getItem(STORAGE_KEYS.LEARNED);
      return learned ? JSON.parse(learned) : [];
    };

    const toggleCardLearned = (cardId) => {
      const learned = getLearnedCards();
      const index = learned.indexOf(cardId);
      const wasLearned = index > -1;
      
      if (wasLearned) {
        learned.splice(index, 1);
      } else {
        learned.push(cardId);
      }
      
      localStorage.setItem(STORAGE_KEYS.LEARNED, JSON.stringify(learned));
      
      // Store for undo
      localStorage.setItem(STORAGE_KEYS.LAST_UNDO, JSON.stringify({
        cardId,
        action: wasLearned ? 'unmarked' : 'marked',
        timestamp: Date.now()
      }));
      
      return !wasLearned;
    };

    const isCardLearned = (cardId) => {
      return getLearnedCards().includes(cardId);
    };

    const getTodayString = () => {
      const today = new Date();
      return today.toISOString().split('T')[0];
    };

    const getLastStudiedCard = () => {
      const cardId = localStorage.getItem(STORAGE_KEYS.LAST_STUDIED);
      return cardId ? parseInt(cardId) : null;
    };

    const setLastStudiedCard = (cardId) => {
      localStorage.setItem(STORAGE_KEYS.LAST_STUDIED, cardId.toString());
      
      // Track session
      const today = getTodayString();
      const lastSession = localStorage.getItem(STORAGE_KEYS.SESSION_DATE);
      
      if (lastSession !== today) {
        localStorage.setItem(STORAGE_KEYS.SESSION_DATE, today);
        localStorage.setItem(STORAGE_KEYS.SESSION_COUNT, '1');
      } else {
        const count = parseInt(localStorage.getItem(STORAGE_KEYS.SESSION_COUNT) || '0');
        localStorage.setItem(STORAGE_KEYS.SESSION_COUNT, (count + 1).toString());
      }
    };

    const getTodaySessionCount = () => {
      const today = getTodayString();
      const lastSession = localStorage.getItem(STORAGE_KEYS.SESSION_DATE);
      
      if (lastSession !== today) return 0;
      return parseInt(localStorage.getItem(STORAGE_KEYS.SESSION_COUNT) || '0');
    };
    
    const undoLastAction = () => {
      const lastUndo = localStorage.getItem(STORAGE_KEYS.LAST_UNDO);
      if (!lastUndo) return null;
      
      const { cardId, action, timestamp } = JSON.parse(lastUndo);
      
      // Only allow undo within 10 seconds
      if (Date.now() - timestamp > 10000) return null;
      
      toggleCardLearned(cardId);
      localStorage.removeItem(STORAGE_KEYS.LAST_UNDO);
      
      return { cardId, action };
    };

    const getTapHintCount = () => {
      return parseInt(localStorage.getItem(STORAGE_KEYS.TAP_HINT_COUNT) || '0');
    };

    const incrementTapHintCount = () => {
      const count = getTapHintCount();
      localStorage.setItem(STORAGE_KEYS.TAP_HINT_COUNT, (count + 1).toString());
    };

    const getSoundEnabled = () => {
      const enabled = localStorage.getItem(STORAGE_KEYS.SOUND_ENABLED);
      return enabled === null ? true : enabled === 'true';
    };

    const toggleSound = () => {
      const enabled = getSoundEnabled();
      localStorage.setItem(STORAGE_KEYS.SOUND_ENABLED, (!enabled).toString());
      return !enabled;
    };

    const resetAllProgress = () => {
      if (confirm('Are you sure you want to reset all progress? This cannot be undone.')) {
        localStorage.removeItem(STORAGE_KEYS.LEARNED);
        localStorage.removeItem(STORAGE_KEYS.LAST_STUDIED);
        localStorage.removeItem(STORAGE_KEYS.SESSION_DATE);
        localStorage.removeItem(STORAGE_KEYS.SESSION_COUNT);
        localStorage.removeItem(STORAGE_KEYS.LAST_UNDO);
        return true;
      }
      return false;
    };

    const playFlipSound = () => {
      if (!getSoundEnabled()) return;
      
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.value = 800;
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.1);
    };

    const getWelcomeSeen = () => {
      return localStorage.getItem(STORAGE_KEYS.WELCOME_SEEN) === 'true';

      }
    };

    // Study Screen with swipe navigation
    function StudyScreen({ mode, category, onNavigate, startCard }) {
      const [cards, setCards] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [isFlipped, setIsFlipped] = useState(false);
      const [learnedCards, setLearnedCards] = useState(getLearnedCards());
      const [filter, setFilter] = useState('all'); // 'all', 'unlearned', 'learned'
      const [showTapHint, setShowTapHint] = useState(getTapHintCount() < 3);
      const [showUndo, setShowUndo] = useState(false);
      const containerRef = useRef(null);
      const touchStartX = useRef(0);
      const touchStartY = useRef(0);

      useEffect(() => {
        let studyCards = [...CARD_DATA];

        if (mode === 'daily') {
          studyCards = [getCardOfTheDay()];
        } else if (mode === 'category' && category) {
          studyCards = CARD_DATA.filter(c => c.categorySlug === category);
        } else if (mode === 'random') {
          // Start with card of the day, then shuffle the rest
          const dailyCard = getCardOfTheDay();
          const otherCards = CARD_DATA.filter(c => c.id !== dailyCard.id).sort(() => Math.random() - 0.5);
          studyCards = [dailyCard, ...otherCards];
        } else if (mode === 'continue') {
          const lastId = getLastStudiedCard();
          const lastIndex = CARD_DATA.findIndex(c => c.id === lastId);
          setCurrentIndex(lastIndex >= 0 ? lastIndex : 0);
        }

        // Apply filter
        if (filter === 'unlearned') {
          studyCards = studyCards.filter(c => !learnedCards.includes(c.id));
        } else if (filter === 'learned') {
          studyCards = studyCards.filter(c => learnedCards.includes(c.id));
        }

        setCards(studyCards);
        setIsFlipped(false);

        // Deep link: jump to specific card by ID
        if (startCard && mode === 'sequential') {
          const idx = studyCards.findIndex(c => c.id === startCard);
          if (idx >= 0) setCurrentIndex(idx);
        }
      }, [mode, category, filter, learnedCards, startCard]);

      // Keyboard navigation
      useEffect(() => {
        const handleKeyPress = (e) => {
          if (e.code === 'ArrowLeft') {
            handlePrevious();
          } else if (e.code === 'ArrowRight') {
            handleNext();
          } else if (e.code === 'Space') {
            e.preventDefault();
            handleFlip();
          }
        };

        window.addEventListener('keydown', handleKeyPress);
        return () => window.removeEventListener('keydown', handleKeyPress);
      }, [currentIndex, cards.length]);

      // Touch swipe handlers
      const handleTouchStart = (e) => {
        touchStartX.current = e.touches[0].clientX;
        touchStartY.current = e.touches[0].clientY;
      };

      const handleTouchEnd = (e) => {
        const touchEndX = e.changedTouches[0].clientX;
        const touchEndY = e.changedTouches[0].clientY;
        const deltaX = touchEndX - touchStartX.current;
        const deltaY = touchEndY - touchStartY.current;

        // Check if swipe is horizontal (not vertical scroll)
        if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 50) {
          if (deltaX > 0) {
            handlePrevious();
          } else {
            handleNext();
          }
        }
      };

      const currentCard = cards[currentIndex];

      const handleNext = () => {
        if (currentIndex < cards.length - 1) {
          setCurrentIndex(currentIndex + 1);
          setIsFlipped(false);
          if (currentCard) {
            setLastStudiedCard(currentCard.id);
          }
        }
      };

      const handlePrevious = () => {
        if (currentIndex > 0) {
          setCurrentIndex(currentIndex - 1);
          setIsFlipped(false);
        }
      };

      const handleFlip = () => {
        playFlipSound();
        setIsFlipped(!isFlipped);
        
        // Increment tap hint count
        if (showTapHint) {
          incrementTapHintCount();
          if (getTapHintCount() >= 3) {
            setShowTapHint(false);
          }
        }
      };

      const handleLearnedToggle = () => {
        if (currentCard) {
          toggleCardLearned(currentCard.id);
          setLearnedCards(getLearnedCards());
          setShowUndo(true);
          setTimeout(() => setShowUndo(false), 3000);
        }
      };

      const handleUndo = () => {
        const result = undoLastAction();
        if (result) {
          setLearnedCards(getLearnedCards());
          setShowUndo(false);
        }
      };

      if (!currentCard) {
        return (
          <div className="flex-1 flex flex-col items-center justify-center p-8">
            <p className="text-gray-600 mb-4">No cards match your filter.</p>
            <button
              onClick={() => setFilter('all')}
              className="px-6 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600"
            >
              Show All Cards
            </button>
          </div>
        );
      }

      const isLearned = isCardLearned(currentCard.id);

      return (
        <div className="flex-1 flex flex-col pb-20">
          {/* Header with filter */}
          <div className="p-4 border-b border-gray-200 flex items-center justify-between">
            <button
              onClick={() => onNavigate('home')}
              className="p-2 hover:bg-gray-100 rounded-lg"
            >
              <i data-lucide="arrow-left" className="w-6 h-6 text-gray-600"></i>
            </button>
            
            {/* Filter Toggle */}
            <div className="flex gap-1 bg-gray-100 rounded-lg p-1">
              <button
                onClick={() => setFilter('all')}
                className={`px-3 py-1 rounded text-xs font-medium transition-colors ${
                  filter === 'all' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-600'
                }`}
              >
                All
              </button>
              <button
                onClick={() => setFilter('unlearned')}
                className={`px-3 py-1 rounded text-xs font-medium transition-colors ${
                  filter === 'unlearned' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-600'
                }`}
              >
                Unlearned
              </button>
              <button
                onClick={() => setFilter('learned')}
                className={`px-3 py-1 rounded text-xs font-medium transition-colors ${
                  filter === 'learned' ? 'bg-white text-gray-900 shadow-sm' : 'text-gray-600'
                }`}
              >
                Learned
              </button>
            </div>

            <button
              onClick={() => shareCard(currentCard)}
              className="p-2 hover:bg-gray-100 rounded-lg"
            >
              <i data-lucide="share-2" className="w-6 h-6 text-gray-600"></i>
            </button>
          </div>

          {/* Card Display */}
          <div 
            className="flex-1 p-4 md:p-8 flex items-center justify-center"
            ref={containerRef}
            onTouchStart={handleTouchStart}
            onTouchEnd={handleTouchEnd}
          >
            <div className="w-full max-w-2xl" style={{ aspectRatio: '2/3', maxHeight: '80vh' }}>
              <Card
                card={currentCard}
                onFlip={handleFlip}
                isFlipped={isFlipped}
                onLearnedToggle={handleLearnedToggle}
                isLearned={isLearned}
                currentIndex={currentIndex}
                totalCards={cards.length}
                showTapHint={showTapHint}
              />
            </div>
          </div>

          {/* Undo button */}
          {showUndo && (
            <div className="fixed bottom-24 left-0 right-0 flex justify-center z-50 fade-in">
              <button
                onClick={handleUndo}
                className="bg-gray-900 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-2 hover:bg-gray-800 transition-colors"
              >
                <i data-lucide="undo-2" className="w-5 h-5"></i>
                <span>Undo</span>
              </button>
            </div>
          )}

          {/* Swipe hint for desktop */}
          <div className="p-4 text-center">
            <p className="text-xs text-gray-500">
              Swipe or use arrow keys to navigate &bull; Spacebar to flip
            </p>
          </div>
        </div>
      );
    }
    // Progress Screen
    function ProgressScreen() {
      const [learnedCards, setLearnedCards] = useState(getLearnedCards());
      const [soundEnabled, setSoundEnabled] = useState(getSoundEnabled());
      const totalCards = CARD_DATA.length;
      const progress = Math.round((learnedCards.length / totalCards) * 100);
      const sessionCount = getTodaySessionCount();

      const categories = [
        { name: 'Trinity', slug: 'trinity', total: 8 },
        { name: 'Christ', slug: 'christ', total: 8 },
        { name: 'Holy Spirit', slug: 'spirit', total: 6 },
        { name: 'Salvation', slug: 'salvation', total: 6 },
        { name: 'Scripture', slug: 'scripture', total: 4 },
        { name: 'Church', slug: 'church', total: 6 },
        { name: 'Christian Life', slug: 'life', total: 8 },
        { name: 'Last Things', slug: 'eschatology', total: 4 }
      ];

      const getCategoryProgress = (slug, total) => {
        const categoryCards = CARD_DATA.filter(c => c.categorySlug === slug);
        const learned = categoryCards.filter(c => learnedCards.includes(c.id)).length;
        return { learned, total, percent: Math.round((learned / total) * 100) };
      };

      const handleReset = () => {
        if (resetAllProgress()) {
          setLearnedCards([]);
        }
      };

      const handleToggleSound = () => {
        const newState = toggleSound();
        setSoundEnabled(newState);
      };

      return (
        <div className="flex-1 overflow-y-auto custom-scrollbar pb-24">
          <div className="max-w-4xl mx-auto p-6">
            <h1 className="text-3xl font-display text-gray-900 mb-8">Your Progress</h1>

            {/* Overall Progress */}
            <div className="bg-gradient-to-r from-blue-500 to-purple-600 rounded-2xl shadow-lg p-8 mb-8 text-white">
              <div className="flex items-center justify-between mb-4">
                <div>
                  <h2 className="text-lg font-semibold">Overall Progress</h2>
                  {sessionCount > 0 && (
                    <p className="text-blue-100 text-sm mt-1">
                      {sessionCount} {sessionCount === 1 ? 'card' : 'cards'} studied today
                    </p>
                  )}
                </div>
                <span className="text-4xl font-bold">{progress}%</span>
              </div>
              <div className="h-3 bg-white bg-opacity-30 rounded-full overflow-hidden mb-2">
                <div 
                  className="h-full bg-white transition-all duration-500"
                  style={{ width: `${progress}%` }}
                />
              </div>
              <p className="text-blue-100">
                {learnedCards.length} of {totalCards} cards learned
              </p>
            </div>

            {/* Category Progress */}
            <div className="space-y-4">
              <h2 className="text-xl font-semibold text-gray-900">By Category</h2>
              {categories.map(cat => {
                const prog = getCategoryProgress(cat.slug, cat.total);
                return (
                  <div key={cat.slug} className="bg-white rounded-xl p-6 shadow-sm border border-gray-200">
                    <div className="flex items-center justify-between mb-3">
                      <h3 className="font-semibold text-gray-900">{cat.name}</h3>
                      <span className="text-lg font-bold text-blue-500">{prog.percent}%</span>
                    </div>
                    <div className="h-2 bg-gray-200 rounded-full overflow-hidden mb-2">
                      <div 
                        className="h-full bg-blue-500 transition-all duration-500"
                        style={{ width: `${prog.percent}%` }}
                      />
                    </div>
                    <p className="text-sm text-gray-600">
                      {prog.learned} of {prog.total} cards
                    </p>
                  </div>
                );
              })}
            </div>

            {/* Stats */}
            <div className="mt-8 grid grid-cols-2 gap-4">
              <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-200 text-center">
                <div className="text-3xl font-bold text-blue-500 mb-2">{totalCards}</div>
                <div className="text-sm text-gray-600">Total Cards</div>
              </div>
              <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-200 text-center">
                <div className="text-3xl font-bold text-green-500 mb-2">{learnedCards.length}</div>
                <div className="text-sm text-gray-600">Learned</div>
              </div>
            </div>

            {/* Settings */}
            <div className="bg-white rounded-xl p-6 shadow-sm border border-gray-200 mb-4">
              <h2 className="text-xl font-semibold text-gray-900 mb-4">Settings</h2>
              
              {/* Sound toggle */}
              <div className="flex items-center justify-between mb-4 pb-4 border-b border-gray-200">
                <div>
                  <h3 className="font-medium text-gray-900">Flip Sound</h3>
                  <p className="text-sm text-gray-600">Play sound when flipping cards</p>
                </div>
                <button
                  onClick={handleToggleSound}
                  className={`relative inline-flex h-6 w-11 items-center rounded-full transition-colors ${
                    soundEnabled ? 'bg-blue-500' : 'bg-gray-300'
                  }`}
                >
                  <span
                    className={`inline-block h-4 w-4 transform rounded-full bg-white transition-transform ${
                      soundEnabled ? 'translate-x-6' : 'translate-x-1'
                    }`}
                  />
                </button>
              </div>

              {/* Reset button */}
              <button
                onClick={handleReset}
                className="w-full bg-red-50 text-red-600 px-4 py-3 rounded-lg font-medium hover:bg-red-100 transition-colors"
              >
                Reset All Progress
              </button>
            </div>
          </div>
        </div>
      );
    }

    // Top Navigation (replaces Bottom Nav)
    function TopNav({ currentView, onNavigate }) {
      const navItems = [
        { id: 'progress', icon: 'trending-up', label: 'Progress' },
        { id: 'home', icon: 'home', label: 'Home' }
      ];

      return (
        <div className="sticky top-0 left-0 right-0 bg-white border-b border-gray-200 z-40">
          <div className="max-w-4xl mx-auto px-4 py-3">
            <div className="flex items-center justify-between">
              
{/* Left-aligned Title as Home button */}
<button
  onClick={() => onNavigate('home')}
  className={`text-xl font-bold transition-colors ${
    currentView === 'home' 
      ? 'text-gray-900' 
      : 'text-gray-800 hover:text-blue-600'
  }`}
>
  Creed Cards
</button>
              
              {/* Nav Items */}
              <div className="flex items-center gap-1">
                {navItems.map(item => (
                  <button
                    key={item.id}
                    onClick={() => onNavigate(item.id)}
                    className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg transition-colors text-sm ${
                      currentView === item.id 
                        ? 'text-blue-600 bg-blue-50' 
                        : 'text-gray-600 hover:bg-gray-50'
                    }`}
                  >
                    <i data-lucide={item.icon} className="w-5 h-5"></i>
                    <span className="font-medium hidden sm:inline">{item.label}</span>
                  </button>
                ))}
              </div>
            </div>
          </div>
        </div>
      );
    }

    // Main App
    function App() {
      const [currentView, setCurrentView] = useState('home');
      const [studyParams, setStudyParams] = useState({});
      const [showWelcome, setShowWelcome] = useState(!getWelcomeSeen());

      const handleNavigate = (view, params = {}) => {
        setCurrentView(view);
        setStudyParams(params);
      };

      const handleCloseWelcome = () => {
        setWelcomeSeen();
        setShowWelcome(false);
      };

      // Deep link: ?card=N navigates directly to that card
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const cardId = parseInt(params.get('card'), 10);
        if (cardId >= 1 && cardId <= 50) {
          setCurrentView('study');
          setStudyParams({ mode: 'sequential', startCard: cardId });
        }
      }, []);

      useEffect(() => {
        // Initialize Lucide icons
        if (window.lucide) {
          lucide.createIcons();
        }
      }, [currentView]);

      return (
        <div className="min-h-screen flex flex-col bg-gray-50">
          {showWelcome && <WelcomeScreen onClose={handleCloseWelcome} />}
          
          <TopNav currentView={currentView} onNavigate={handleNavigate} />
          
          <div className="flex-1 overflow-auto">
            {currentView === 'home' && <HomeScreen onNavigate={handleNavigate} />}
            {currentView === 'study' && (
              <StudyScreen
                mode={studyParams.mode || 'sequential'}
                category={studyParams.category}
                startCard={studyParams.startCard}
                onNavigate={handleNavigate}
              />
            )}
            {currentView === 'progress' && <ProgressScreen />}
          </div>
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => {
        console.log('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
